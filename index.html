<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NWO Cybermobbing Network - Complete Disclosure</title>
    <style>
      #music-indicator {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0, 51, 102, 0.9);
        color: white;
        padding: 10px 15px;
        border-radius: 25px;
        font-size: 12px;
        z-index: 9999;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
      }
      #music-indicator:hover {
        background: rgba(0, 51, 102, 1);
        transform: scale(1.05);
      }
      .music-icon {
        width: 16px;
        height: 16px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <audio id="background-music" loop preload="auto">
      <source src="/Jenne 2003.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div id="music-indicator" onclick="toggleMusic()">
      <span class="music-icon">🎵</span>
      <span id="music-status">Klicke für Musik</span>
    </div>
    <script>
      let audio = document.getElementById('background-music');
      let musicIndicator = document.getElementById('music-indicator');
      let musicStatus = document.getElementById('music-status');
      let musicPlaying = false;

      function toggleMusic() {
        if (musicPlaying) {
          audio.pause();
          musicStatus.textContent = 'Musik pausiert';
          musicPlaying = false;
        } else {
          audio.play().then(() => {
            musicStatus.textContent = '🎵 Musik spielt';
            musicPlaying = true;
          }).catch(function(e) {
            console.log('Music playback failed:', e);
            musicStatus.textContent = 'Fehler beim Abspielen';
          });
        }
      }

      // Aggressive autoplay attempt
      function attemptAutoplay() {
        audio.volume = 0.3;
        
        // Try autoplay immediately
        audio.play().then(() => {
          musicStatus.textContent = '🎵 Musik spielt';
          musicPlaying = true;
        }).catch(function(error) {
          console.log('Initial autoplay prevented, trying again...');
          
          // Try again after 1 second
          setTimeout(() => {
            audio.play().then(() => {
              musicStatus.textContent = '🎵 Musik spielt';
              musicPlaying = true;
            }).catch(function(error) {
              console.log('Second autoplay attempt failed, waiting for user interaction');
              musicStatus.textContent = 'Klicke für Musik';
              
              // Add click listener to entire document for first user interaction
              const startMusicOnFirstClick = () => {
                audio.play().then(() => {
                  musicStatus.textContent = '🎵 Musik spielt';
                  musicPlaying = true;
                  document.removeEventListener('click', startMusicOnFirstClick);
                });
              };
              document.addEventListener('click', startMusicOnFirstClick, { once: true });
            });
          }, 1000);
        });
      }

      document.addEventListener('DOMContentLoaded', function() {
        attemptAutoplay();
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
